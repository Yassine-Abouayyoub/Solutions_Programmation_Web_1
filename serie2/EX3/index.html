<!DOCTYPE html>
<html>
    <head>
        <title>Exercice 3</title>
        <style>
            table {
                border-collapse: collapse;
                width: 300px;
            }

            table, th, td{
                border: 1px solid black;
                text-align: center;
            }
            table th{
                background: blue;
                color: white;
            }
            table tr:nth-child(even){
                background: #d3d3d3;
            }
            table tr:nth-child(odd){
                background: #ffffff;
            }
            table tr:hover{
                background: gray;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>Nom</th>
                <th>Prenom</th>
                <th>Note</th>
            </tr>
            <tr>
                <td>Ali</td>
                <td>Sarah</td>
                <td>16</td>
            </tr>
            <tr>
                <td>Karim</td>
                <td>Lina</td>
                <td>14</td>
            </tr>
            <tr>
                <td>Youssef</td>
                <td>Amal</td>
                <td>18</td>
            </tr>
        </table>
    </body>
</html>
