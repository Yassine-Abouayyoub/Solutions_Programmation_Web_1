<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Test d'affichage avec document.write</title>
        <style>
            table{
                border: 1px solid black;
            }
            td, th{
                border: 1px solid black;
                padding: 2px;
            }
        </style>
    </head>
    <body>
        <h2>Test d'affichege</h2>
        <script>
            let age= prompt("Votre age: ");
            if (age>=18){
                document.write("<p>Vous êtes majeur.</p>");
                alert("Vous êtes majeur.");
            } else{
                document.write("<p>Vous êtes mineur.</p>");
                alert("Vous êtes mineur.");
            }
            document.write("<h2> Table de multiplication de 0 a 9</h2>");
            document.write("<table>");
            document.write("<tr>")
            document.write("<th>*</th>")
            for(let i=0;i<10;i++){
                document.write("<th>"+ i +"</th>")
            }
            document.write("</tr>")

            for(let i=0;i<10;i++){
                document.write("<tr>")
                document.write("<th>"+ i +"</th>")
                for(let j=0;j<10;j++){
                    document.write("<td>"+ i*j +"</td>")    
                }
                document.write("</tr>")
            }
            document.write("</table>")
        </script>
    </body>
</html>
