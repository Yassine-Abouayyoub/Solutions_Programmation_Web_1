<!DOCTYPE html>
<html>
    <head>
        <title>TP Sect&egrave;ur CSS</title>
        <style>
            body{
                font-family:Verdana;
            }
            h1, h2{
                color:blue;
            }
            .info{
                font-style: italic;
            }
            #important{
                color: red;
                font-weight: bold;   
            }
            div p{
                background-color: gray;
            }
            h2 + p{
                text-decoration: underline;
            }
            li{
                color: green;
            }
            ul li:first-child{
                font-weight: bold;
            }
            ul li:last-child{
                color: orange;
                font-weight: bold;
            }
            a{
                color:#8F00FF;
            }
            a:hover{
                color: red;
            }
        </style>
    </head>
    <body>
        <h1>Titre principal</h1>
        <p>Paragraphe introduction</p>
        <p classe="info">Paragraphe information</p>
        <p id="important">Paragraphe important</p>
        <div>
            <p>Paragraphe dans div</p>
            <p class="info">Autre paragraphe dans div</p>
        </div>
        <h2 classe="section">Titre section 1</h2>
        <p>Paragraph section 1</p>
        <ul>
            <li>&Egrave;l&egrave;ment 1</li>
            <li>&Egrave;l&egrave;ment 2</li>
            <li>&Egrave;l&egrave;ment 2</li>
        </ul>
        <a href="#">Lien 1</a>
        <a href="#">Lien 2</a>
    </body>
</html>
